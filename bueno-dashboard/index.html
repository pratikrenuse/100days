<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Bueno Ads Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f6f7f9; color:#1a1d21; font-size:14px; line-height:1.45; }
  .wrap { max-width:1100px; margin:0 auto; padding:22px; }
  #gate { max-width:360px; margin:14vh auto; background:#fff; border:1px solid #eceef1; border-radius:14px; padding:26px; text-align:center; }
  #gate h1 { font-size:18px; margin:0 0 4px; }
  #gate p { color:#6b7280; font-size:13px; margin:0 0 18px; }
  #gate input { width:100%; padding:11px 12px; border:1px solid #d6dae0; border-radius:9px; font-size:14px; margin-bottom:10px; }
  #gate button { width:100%; padding:11px; border:0; border-radius:9px; background:#2563eb; color:#fff; font-weight:600; font-size:14px; cursor:pointer; }
  #gate button:disabled { opacity:.6; cursor:default; }
  #gateErr { color:#b42318; font-size:12.5px; min-height:16px; margin-top:8px; }
  .head { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:4px; }
  h1.t { font-size:20px; margin:0; font-weight:700; }
  .sub { color:#6b7280; font-size:12.5px; margin-bottom:18px; }
  .controls { display:flex; gap:6px; }
  .controls button { border:1px solid #d6dae0; background:#fff; color:#374151; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:500; }
  .controls button.active { background:#2563eb; border-color:#2563eb; color:#fff; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
  .card { background:#fff; border:1px solid #eceef1; border-radius:12px; padding:14px 16px; }
  .card .label { color:#6b7280; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; }
  .card .val { font-size:22px; font-weight:700; margin-top:4px; }
  .section { background:#fff; border:1px solid #eceef1; border-radius:12px; padding:16px 18px; margin-bottom:18px; }
  .section h2 { font-size:15px; margin:0 0 12px; font-weight:700; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:right; padding:8px 10px; border-bottom:1px solid #f0f1f3; white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; }
  th { color:#6b7280; font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.03em; cursor:pointer; user-select:none; }
  tr:last-child td { border-bottom:none; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .pill.active { background:#e7f6ec; color:#1a7f37; }
  .pill.paused { background:#fdecec; color:#b42318; }
  .sub-row td { background:#fafbfc; color:#4b5563; font-size:12.5px; }
  .sub-row td:first-child { padding-left:26px; }
  .chartbox { position:relative; height:240px; }
  .foot { color:#9ca3af; font-size:11.5px; margin-top:6px; }
  .hidden { display:none !important; }
</style>
</head>
<body>

<div id="gate">
  <h1>Bueno Ads</h1>
  <p>Enter the password to view the dashboard.</p>
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
  <button id="go">Unlock</button>
  <div id="gateErr"></div>
</div>

<div class="wrap hidden" id="app">
  <div class="head">
    <div>
      <h1 class="t">Bueno Ads Dashboard</h1>
      <div class="sub" id="sub"></div>
    </div>
    <div class="controls" id="ranges">
      <button data-range="last_7d">7 days</button>
      <button data-range="last_30d" class="active">30 days</button>
      <button data-range="last_90d">90 days</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="section">
    <h2>Spend by campaign</h2>
    <div class="chartbox"><canvas id="spendChart"></canvas></div>
  </div>

  <div class="section">
    <h2>Campaigns &amp; ad sets</h2>
    <table id="tbl">
      <thead><tr>
        <th data-k="name">Name</th>
        <th data-k="status">Status</th>
        <th data-k="spend">Spend</th>
        <th data-k="impressions">Impr.</th>
        <th data-k="clicks">Clicks</th>
        <th data-k="ctr">CTR</th>
        <th data-k="cpc">CPC</th>
        <th data-k="resultValue">Key result</th>
        <th data-k="costPer">Cost/result</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="foot">Ad sets are nested under their campaign. Click a column header to sort campaigns.</div>
  </div>
</div>

<script>
const CURRENCY = "NOK";
let DATA = null, RANGE = "last_30d", chart = null, sortKey = "spend", sortDir = -1;

const fmtMoney = n => CURRENCY + " " + (n||0).toLocaleString("en-US",{maximumFractionDigits:2});
const fmtInt   = n => (n||0).toLocaleString("en-US");
const fmtPct   = n => (n||0).toFixed(2) + "%";
function statusPill(s){ const a=/ACTIVE/i.test(s||""); return '<span class="pill '+(a?"active":"paused")+'">'+(a?"Active":"Paused")+'</span>'; }

async function unlock(){
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("gateErr");
  const btn = document.getElementById("go");
  err.textContent = "Loading…"; btn.disabled = true;
  try {
    const res = await fetch("/api/bueno-data", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw })
    });
    if (res.status === 401) { err.textContent = "Wrong password."; btn.disabled = false; return; }
    if (!res.ok) { const j = await res.json().catch(()=>({})); throw new Error(j.error || ("HTTP "+res.status)); }
    DATA = await res.json();
  } catch(e){ err.textContent = e.message; btn.disabled = false; return; }
  sessionStorage.setItem("bueno_pw", pw);
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();
}

function render(){
  const d = DATA.ranges[RANGE];
  const a = d.account;
  document.getElementById("sub").textContent =
    "Bueno (" + CURRENCY + ") · " + (a.date_start && a.date_stop ? a.date_start+" – "+a.date_stop : RANGE)
    + " · updated " + new Date(DATA.generated_at).toLocaleString();

  document.getElementById("cards").innerHTML = [
    ["Spend", fmtMoney(a.spend)], ["Impressions", fmtInt(a.impressions)],
    ["Reach", fmtInt(a.reach)], ["Clicks", fmtInt(a.clicks)],
    ["CTR", fmtPct(a.ctr)], ["CPC", fmtMoney(a.cpc)], ["CPM", fmtMoney(a.cpm)]
  ].map(([l,v])=>'<div class="card"><div class="label">'+l+'</div><div class="val">'+v+'</div></div>').join("");

  const camps = d.campaigns.slice().sort((x,y)=>y.spend-x.spend);
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("spendChart"), {
    type:"bar",
    data:{ labels:camps.map(c=>c.name), datasets:[{ data:camps.map(c=>c.spend), backgroundColor:"#2563eb", borderRadius:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ y:{ beginAtZero:true, ticks:{ callback:v=>CURRENCY+" "+v.toLocaleString() } } } }
  });

  renderTable();
}

function renderTable(){
  const d = DATA.ranges[RANGE];
  const camps = d.campaigns.slice().sort((x,y)=>{
    const va=x[sortKey], vb=y[sortKey];
    return (typeof va==="string" ? (va>vb?1:-1) : (va-vb)) * sortDir;
  });
  const rows = [];
  camps.forEach(c=>{
    rows.push(rowHtml(c,false));
    d.adsets.filter(s=>s.campaign_id===c.id).sort((a,b)=>b.spend-a.spend)
      .forEach(s=>rows.push(rowHtml(s,true)));
  });
  document.getElementById("tbody").innerHTML = rows.join("");
}
function rowHtml(e, sub){
  const result = e.resultValue ? fmtInt(e.resultValue)+" "+e.resultLabel : "—";
  const cost = e.costPer ? fmtMoney(e.costPer) : "—";
  return '<tr'+(sub?' class="sub-row"':'')+'>'+
    '<td>'+(sub?'↳ ':'')+e.name+'</td>'+
    '<td>'+statusPill(e.status)+'</td>'+
    '<td>'+fmtMoney(e.spend)+'</td>'+
    '<td>'+fmtInt(e.impressions)+'</td>'+
    '<td>'+fmtInt(e.clicks)+'</td>'+
    '<td>'+fmtPct(e.ctr)+'</td>'+
    '<td>'+fmtMoney(e.cpc)+'</td>'+
    '<td>'+result+'</td>'+
    '<td>'+cost+'</td></tr>';
}

document.getElementById("go").addEventListener("click", unlock);
document.getElementById("pw").addEventListener("keydown", e=>{ if(e.key==="Enter") unlock(); });
document.getElementById("ranges").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  RANGE=b.dataset.range;
  document.querySelectorAll("#ranges button").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
document.querySelectorAll("#tbl th").forEach(th=>th.addEventListener("click",()=>{
  const k=th.dataset.k; if(!k) return;
  if(sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=-1; }
  renderTable();
}));

(function(){
  const saved = sessionStorage.getItem("bueno_pw");
  if(saved){ document.getElementById("pw").value = saved; unlock(); }
})();
</script>
</body>
</html>
